apiVersion: v1
kind: Namespace
metadata:
  name: customer-success-fte
  labels:
    app: customer-success-fte
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fte-config
  namespace: customer-success-fte
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  POSTGRES_HOST: "postgres.customer-success-fte.svc.cluster.local"
  POSTGRES_DB: "fte_db"
  # Channel toggles
  GMAIL_ENABLED: "true"
  WHATSAPP_ENABLED: "true"
  WEBFORM_ENABLED: "true"
  # Response Limits
  MAX_EMAIL_LENGTH: "2000"
  MAX_WHATSAPP_LENGTH: "1600"
  MAX_WEBFORM_LENGTH: "1000"
---
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-proj-xxxxxxxx" 
  POSTGRES_PASSWORD: "secure-password"
  # Gmail credentials
  GMAIL_CREDENTIALS: '{"installed":{...}}'
  # Meta WhatsApp Cloud API credentials
  WHATSAPP_TOKEN: "EAAGxxxxxxxxxxxx"
  WHATSAPP_PHONE_NUMBER_ID: "1234567890"
  WHATSAPP_VERIFY_TOKEN: "saasflow_verify_token"
